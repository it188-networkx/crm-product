name: "[设计] UX 交互设计 (Feature UX Design)"
description: 基于需求特性定义与技术方案，将用户故事与业务规则转化为可交互的体验蓝图
title: "[交互设计] <Feature名称>"
labels: ["domain:product", "activity:design"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ### UX 交互设计

        基于需求特性定义与技术方案，将用户故事与业务规则转化为可交互的体验蓝图。

  - type: input
    id: feature_name
    attributes:
      label: Feature 名称
      placeholder: 例如：工单自动分配引擎
    validations:
      required: true

  - type: textarea
    id: feature_requirement_a11
    attributes:
      label: 需求特性定义 (A11)
      description: S11 输出中的用户故事、业务规则与验收标准
      placeholder: 请提供 planning/<theme>/<epic>/<feature>.md 的 URL
    validations:
      required: true

  - type: textarea
    id: tech_design_a16
    attributes:
      label: 技术方案 (A16)
      description: S15 输出中的数据形状与技术约束
      placeholder: 请提供 design/<feature>/tech-design.md 的 URL
    validations:
      required: true

  - type: textarea
    id: wireframe
    attributes:
      label: 原型图/线框图
      description: 初步的交互草图或线框
      placeholder: 请提供资料的 URL 或将文件拖拽至此处上传
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ### 输出物要求

        - [ ] **UX 交互设计 (A17)**：包含任务流（Mermaid Flowchart）、界面元素定义（字段级含校验规则）、状态机流转、异常场景处理
