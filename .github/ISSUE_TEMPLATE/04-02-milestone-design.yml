name: "[规划] 里程碑设计 (Milestone Design)"
description: 基于路线图版本定义，生成或更新里程碑计划
title: "[里程设计] <版本号> - <交付目标>"
labels: ["domain:product", "activity:planning"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ### 里程碑设计

        基于路线图版本定义，生成或更新里程碑计划，
        定义版本目标、交付范围、关键时间点与准入准出标准。

  - type: input
    id: version
    attributes:
      label: 版本号
      placeholder: 例如：v1.0.0, v2.1.0
    validations:
      required: true

  - type: textarea
    id: delivery_target
    attributes:
      label: 交付目标
      description: 本版本的核心交付目标（含版本主题与核心价值）
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: 风险项
      description: 已识别的技术/资源/市场风险（每条需描述风险场景和可能影响）
    validations:
      required: false

  - type: textarea
    id: dependency_matrix
    attributes:
      label: 依赖矩阵
      description: Feature 间及外部依赖关系
      placeholder: 请提供资料的 URL 或将文件拖拽至此处上传
    validations:
      required: false

  - type: textarea
    id: test_plan_summary
    attributes:
      label: 测试计划概要
      description: QA 提供的测试计划概要
      placeholder: 请提供资料的 URL 或将文件拖拽至此处上传
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ### 输出物要求

        - [ ] **里程碑计划 (A0402)**：包含概览、交付范围、上线标准、资源需求、风险与缓解、回滚方案
