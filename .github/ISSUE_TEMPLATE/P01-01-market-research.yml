name: "[探索] 市场调研 (Market Research)"
description: 围绕指定市场主题，综合一手与二手数据，系统性验证市场假设、量化市场规模与切入时机
title: "[市场调研] <调研主题>"
labels: ["domain:product", "activity:analysis"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ### 市场调研

        围绕指定市场主题，综合一手数据（访谈/问卷）与二手数据（研报/基准），
        系统性验证市场假设、量化市场规模与切入时机，产出结构化的市场调研报告。

  - type: input
    id: research_topic
    attributes:
      label: 调研主题
      placeholder: 例如：中国制造业现场服务数字化市场
    validations:
      required: true

  - type: input
    id: target_market
    attributes:
      label: 目标市场
      placeholder: 例如：中大型制造企业现场服务
    validations:
      required: true

  - type: textarea
    id: core_hypothesis
    attributes:
      label: 核心假设
      description: 本次调研需要验证的市场假设
      placeholder: |
        例如：
        - 假设 1：中大型制造企业对 FSM 系统的需求正在快速增长
        - 假设 2：现有解决方案在移动端体验上存在明显不足
    validations:
      required: true

  - type: textarea
    id: industry_reports
    attributes:
      label: 行业研究报告 (D01)
      description: 第三方行业研究报告
      placeholder: 请提供资料的 URL 或将文件拖拽至此处上传
    validations:
      required: false

  - type: textarea
    id: market_data
    attributes:
      label: 市场数据 (D02)
      description: 市场规模、增长率等量化数据
      placeholder: 请提供资料的 URL 或将文件拖拽至此处上传
    validations:
      required: false

  - type: textarea
    id: interview_records
    attributes:
      label: 客户访谈纪要 (D03)
      description: 一手访谈数据
      placeholder: 请提供资料的 URL 或将文件拖拽至此处上传
    validations:
      required: false

  - type: textarea
    id: product_concept
    attributes:
      label: 产品概念书 (A05)
      description: S05 输出中的市场假设与目标用户
      placeholder: 请提供 concept/product-concept.md 的 URL
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### 输出物要求

        - [ ] **市场调研报告 (A01)**：包含概述、调研方法、市场规模分析（TAM/SAM/SOM）、行业趋势、市场细分与选择、进入策略建议
