name: "[规划] 路线图规划 (Roadmap Planning)"
description: 基于需求大纲编排 Theme 时间线，生成或更新路线图
title: "[路线规划] <产品名称> - <规划周期>"
labels: ["domain:product", "activity:planning"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ### 路线图规划

        基于需求大纲编排 Theme 时间线，生成或更新路线图。

  - type: textarea
    id: product_goal
    attributes:
      label: 产品目标
      description: 本次路线图规划的核心产品目标（含规划时间范围与核心交付预期）
    validations:
      required: true

  - type: textarea
    id: schedule_constraints
    attributes:
      label: 排期约束
      description: 时间窗口、硬性截止日期（发布日期、合同承诺、市场窗口截止等）
    validations:
      required: true

  - type: textarea
    id: strategic_context
    attributes:
      label: 战略调整背景
      description: 本次规划涉及的战略调整背景（如有）
    validations:
      required: false

  - type: textarea
    id: resource_capacity_d14
    attributes:
      label: 资源容量表 (D14)
      description: 团队资源容量信息
      placeholder: 请提供资料的 URL 或将文件拖拽至此处上传
    validations:
      required: false

  - type: textarea
    id: customer_commitments_d15
    attributes:
      label: 客户承诺 (D15)
      description: 已作出的客户交付承诺
      placeholder: 请提供资料的 URL 或将文件拖拽至此处上传
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ### 输出物要求

        - [ ] **路线图 (A0401)**：包含战略摘要、宏观路线图（季度总览表）、季度规划（渐进细化）、风险与依赖
