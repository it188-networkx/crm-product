name: "[架构] 系统容量设计 (Capacity Design)"
description: 预估资源需求，定义 SLO 指标与弹性扩缩策略，确保系统容量合规
title: "[容量设计] <产品名称> - <版本/阶段>"
labels: ["domain:design", "activity:architecture"]
assignees: []
body:
  # 1. 任务说明
  - type: markdown
    attributes:
      value: |
        ### 系统容量设计

        基于系统架构与特性设计，预估峰值负载与资源需求，定义 SLO 指标，
        设计弹性扩缩策略，产出容量规划方案。

  # 2. 上游输入
  - type: input
    id: architecture_doc
    attributes:
      label: 架构设计文档 (A0501)
      placeholder: 请提供 architecture/architecture.md 的 URL
    validations:
      required: true

  - type: input
    id: feature_design
    attributes:
      label: 功能特性设计文档 (A0306)
      description: 涉及容量计算的关键特性设计
      placeholder: 请提供相关特性 design.md 的 URL
    validations:
      required: false

  # 3. 容量基准
  - type: textarea
    id: load_estimation
    attributes:
      label: 负载预估
      description: 描述峰值并发、数据增长与流量分布
      placeholder: |
        日活用户：
        峰值并发：
        每日数据写入量：
        数据保留周期：
    validations:
      required: true

  - type: textarea
    id: slo_targets
    attributes:
      label: SLO 指标目标
      description: 定义关键服务的可用性与性能目标
      placeholder: |
        - 可用性 SLO：99.9%（月错误预算 43.8 分钟）
        - API P99 响应时间：< 500ms
        - 数据库 QPS 峰值：10,000
    validations:
      required: true

  - type: dropdown
    id: scaling_strategy
    attributes:
      label: 弹性扩缩策略
      options:
        - 水平扩展（Horizontal Scaling）
        - 垂直扩展（Vertical Scaling）
        - 混合策略
        - 无需弹性（固定规格）
    validations:
      required: true

  # 4. 输出验收
  - type: markdown
    attributes:
      value: |
        ### 输出物要求

        - [ ] **容量规划方案**：存入 `architecture/capacity.md`
        - [ ] **资源清单**：各服务计算/存储/网络资源规格
        - [ ] **SLO 定义**：可用性指标、错误预算与告警阈值
        - [ ] **扩缩规则**：触发条件、扩缩步长与冷却时间
