name: "[规划] 功能架构规划 (Functional Architecture)"
description: 编制产品功能架构与需求主题目录，作为需求树的顶层入口
title: "[功能架构] <产品名称> - <版本目标>"
labels: ["domain:product", "activity:requirement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ### 功能架构规划

        从产品定义文档与 Discovery 报告中提取战略要素，规划产品功能架构与需求主题目录，
        定义北极星指标、总体架构与 Theme 目录索引，作为需求树的顶层入口。

  - type: input
    id: version_target
    attributes:
      label: 版本目标
      description: 规划时间范围与核心交付预期
      placeholder: 例如：v1.0 MVP 核心功能闭环
    validations:
      required: false

  - type: textarea
    id: strategic_adjustment
    attributes:
      label: 战略调整背景
      description: 如有战略方向或市场环境变化，请说明
    validations:
      required: false

  - type: textarea
    id: theme_adjustment
    attributes:
      label: Theme 调整意图
      description: Theme 新增/删除/重排优先级，需指明具体 Theme 名称与目标优先级（P0/P1/P2）
      placeholder: |
        - 新增 Theme：<名称>，优先级 P0，原因：...
        - 删除 Theme：<名称>，原因：...
        - 重排：<名称> P1→P0，原因：...
    validations:
      required: false

  - type: textarea
    id: pdd_summary
    attributes:
      label: 产品定义文档更新摘要 (A0203)
      description: 产品定义文档的变更摘要或 URL
      placeholder: 请提供产品定义文档的 URL 或将更新摘要粘贴至此
    validations:
      required: false

  - type: textarea
    id: exploration_summary
    attributes:
      label: 探索报告汇总
      description: Discovery 阶段各报告的关键结论汇总
      placeholder: 请提供汇总表 URL 或将关键结论粘贴至此
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ### 输出物要求

        - [ ] **产品需求大纲 (A0301)**：包含版本概述（业务背景/版本目标/北极星指标/核心指标）、主题规划（Theme 清单与优先级）、全局约束
