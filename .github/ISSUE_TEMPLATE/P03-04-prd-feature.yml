name: "[规划] 功能特性规划 (Functional Feature)"
description: 围绕 Epic 下定义的 Feature，规划最小可交付单元的详细定义，包含用户故事、业务规则与验收标准
title: "[特性规划] <Epic>/<Feature名称>"
labels: ["domain:product", "activity:requirement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ### 功能特性规划

        围绕 Epic 下定义的 Feature，规划最小可交付单元的详细定义，
        包含用户故事、业务流程、业务规则与验收标准，为下游设计三件套提供唯一需求基线。

  - type: input
    id: feature_name
    attributes:
      label: Feature 名称
      placeholder: 例如：工单自动分配引擎
    validations:
      required: true

  - type: input
    id: parent_epic_theme
    attributes:
      label: 所属 Epic/Theme
      placeholder: 例如：工单管理 / 工单创建与分配
    validations:
      required: true

  - type: textarea
    id: user_story
    attributes:
      label: 用户故事
      description: 以"作为...我希望...以便..."格式描述
      placeholder: |
        作为 [角色]，
        我希望 [功能]，
        以便 [价值/目的]。
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: AC 草稿
      description: 初步的验收标准（Happy Path + Edge Cases + 异常路径）
      placeholder: |
        AC-01: Given... When... Then...
        AC-02: Given... When... Then...
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - P0 - 必须（Must Have）
        - P1 - 应该（Should Have）
        - P2 - 可以（Could Have）
        - P3 - 不做（Won't Have）
    validations:
      required: true

  - type: textarea
    id: wireframe
    attributes:
      label: 原型图/线框图
      description: 初步的界面草图或线框图
      placeholder: 请提供资料的 URL 或将文件拖拽至此处上传
    validations:
      required: false

  - type: textarea
    id: business_rules
    attributes:
      label: 业务规则文档
      description: 与该 Feature 相关的业务规则
      placeholder: 请提供资料的 URL 或将文件拖拽至此处上传
    validations:
      required: false

  - type: textarea
    id: data_dictionary
    attributes:
      label: 数据字典
      description: 该 Feature 涉及的数据模型定义
      placeholder: 请提供资料的 URL 或将文件拖拽至此处上传
    validations:
      required: false

  - type: textarea
    id: epic_doc
    attributes:
      label: 产品史诗定义 (A10)
      description: S10 输出的产品史诗定义
      placeholder: 请提供 Epic 文档的 URL
    validations:
      required: true

  - type: textarea
    id: requirement_report
    attributes:
      label: 需求报告 (A04)
      description: S04 输出中的需求分析与价值评估
      placeholder: 请提供 discovery/requirements/ 目录下相关文档的 URL
    validations:
      required: true

  - type: textarea
    id: user_persona
    attributes:
      label: 用户画像 (A03)
      description: S03 输出中的用户旅程与痛点
      placeholder: 请提供 discovery/users/ 目录下相关文档的 URL
    validations:
      required: true

  - type: textarea
    id: change_records
    attributes:
      label: 需求变更记录 (A27)
      description: S26 输出中影响本 Feature 的变更结论
      placeholder: 请提供 planning/changes/ 目录下相关文档的 URL
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ### 输出物要求

        - [ ] **需求特性定义 (A11)**：包含特性概述、用户故事、业务流程（Mermaid）、业务规则（BR-xx）、数据要求、异常处理（E-xx）、验收标准（AC-xx）
