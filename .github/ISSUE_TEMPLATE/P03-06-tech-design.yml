name: "[设计] 功能特性设计 (Feature Tech Design)"
description: 编制草案级技术纲要，定义数据模型概念、API 设计方向与后端逻辑策略
title: "[技术设计] <Feature名称>"
labels: ["domain:product", "activity:design"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ### 功能特性设计

        基于需求特性定义与系统架构约束，编制草案级技术纲要，定义数据模型概念、
        API 设计方向与后端逻辑策略，为 UX/UI 设计提供数据形状理解、
        为 Coding Agent 提供快速实现方向。

  - type: input
    id: feature_name
    attributes:
      label: Feature 名称
      description: 需与需求特性定义文件名一致
      placeholder: 例如：工单自动分配引擎
    validations:
      required: true

  - type: input
    id: feature_path
    attributes:
      label: 所属 Feature 路径
      description: theme/epic/feature 格式，用于定位需求特性定义
      placeholder: 例如：ticket-management/ticket-creation/auto-assign
    validations:
      required: true

  - type: textarea
    id: tech_focus
    attributes:
      label: 技术设计重点
      description: 需要重点关注的技术领域
      placeholder: |
        例如：
        - 数据模型
        - API 设计
        - 后端逻辑
    validations:
      required: false

  - type: textarea
    id: data_dictionary
    attributes:
      label: 数据字典
      description: 已有的数据模型定义
      placeholder: 请提供资料的 URL 或将文件拖拽至此处上传
    validations:
      required: false

  - type: textarea
    id: api_draft
    attributes:
      label: API 规范草案
      description: 已有的 API 端点或 OpenAPI 片段
      placeholder: 请提供资料的 URL 或将文件拖拽至此处上传
    validations:
      required: false

  - type: textarea
    id: arch_doc_fragment
    attributes:
      label: 架构设计文档片段
      description: 与该 Feature 相关的架构设计摘要
      placeholder: 请提供资料的 URL 或将文件拖拽至此处上传
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ### 输出物要求

        - [ ] **技术方案 (A0306)**：包含概述与迭代规划、数据模型草案（概念 ER）、API 设计纲要（关键端点与请求响应概念）、后端逻辑方向（CRON/Event/一致性策略选择）
