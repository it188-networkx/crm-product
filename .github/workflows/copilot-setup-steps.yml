# Copilot Coding Agent pre-setup workflow
#
# GitHub 在每次 Copilot Coding Agent 开始处理 issue/PR 前自动运行此文件。
# 本 workflow 用于：
#   1. 将当前仓库主分支 checkout 到 runner 环境
#   2. 使用 PAT 将外部仓库克隆到工作区根目录（与当前仓库平级）
#
# ⚠️  前置条件（必须在 GitHub 仓库设置中完成）：
#   Settings → Environments → "copilot" → Secrets → 添加：
#     GH_PAT  —— fine-grained PAT（或 classic PAT），需具备以下仓库的 Contents:Read 权限：
#               - it188-networkx/ops-playbook
#
#   注意：Copilot Coding Agent 只能访问 "copilot" environment 中的 secrets，
#         仓库级（repository-level）secrets 对 agent 不可见。
#
# 目录布局（Copilot 运行时可见）：
#   $GITHUB_WORKSPACE/                  ← 当前仓库根目录
#   $GITHUB_WORKSPACE/ops-playbook/     ← it188-networkx/ops-playbook 完整内容

name: "Copilot Setup Steps"

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    # ⚠️  必须保留此行，Copilot agent 只能读取 copilot environment 中的 secrets
    environment: copilot
    permissions:
      contents: read

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Clone context repositories
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # --- ops-playbook: Sprint 计划、SOP、任务目录等参考资料 ---
          echo "Cloning it188-networkx/ops-playbook ..."
          git clone --depth=1 \
            "https://oauth2:${GH_PAT}@github.com/it188-networkx/ops-playbook.git" \
            ops-playbook
          echo "ops-playbook cloned: $(find ops-playbook -type f | wc -l) files"

          # --- product-base: 产品基础知识库 ---
          echo "Cloning it188-networkx/product-base ..."
          git clone --depth=1 \
            "https://oauth2:${GH_PAT}@github.com/it188-networkx/product-base.git" \
            product-base
          echo "product-base cloned: $(find product-base -type f | wc -l) files"

          # --- 如需访问更多仓库，在此处追加 clone 步骤 ---
          # git clone --depth=1 \
          #   "https://oauth2:${COPILOT_GIT_PAT}@github.com/it188-networkx/<other-repo>.git" \
          #   <other-repo>

          echo ""
          echo "=== Context repositories available at workspace root ==="
          ls -la

      - name: Print context summary
        run: |
          echo "=== Copilot context layout ==="
          echo "Current repo  : $GITHUB_WORKSPACE"
          echo "ops-playbook/ : sprint plans, SOPs, task catalogs"
          echo "product-base/ : product base knowledge"
