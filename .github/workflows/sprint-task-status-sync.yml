name: Sprint Task Status Sync

# 冲刺任务状态定时同步
# 定时轮询所有活跃冲刺任务的关联 Issue 与 PR，自动更新 A2007 中的
# PR 引用列、任务状态与完成日期，并管理关联 Issue 生命周期。
#
# 状态转换：
#   已派发 + copilot_work_finished 事件 + open PR（含 draft）→ 待修订（更新 PR 列）
#   已派发 + PR merged              → 已完成（更新 PR 列 + 日期 + 关闭 Issue）
#   已派发 + PR closed 未合并       → 可执行（清空 PR 列 + Issue 评论）
#   待修订 + PR merged              → 已完成（更新日期 + 关闭 Issue）
#   待修订 + PR closed 未合并       → 可执行（清空 PR 列 + Issue 评论）

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

concurrency:
  group: sprint-status-sync
  cancel-in-progress: false

jobs:
  sync-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      issues: write

    steps:
      - name: Checkout sprints directory
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: sprints
          sparse-checkout-cone-mode: true

      - name: Sync task status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');

            const { owner, repo } = context.repo;
            const workspace = process.env.GITHUB_WORKSPACE;
            const sprintsDir = path.join(workspace, 'sprints');

            if (!fs.existsSync(sprintsDir)) {
              core.info('sprints/ directory not found. Skipping.');
              return;
            }

            // ── 步骤 1: 收集所有 PR（open + 近期 closed）────────
            // 建立 issueNumber → PR[] 映射，用于匹配 A2007 任务行
            const openPRs = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: 'open', per_page: 100,
            });
            const closedPRs = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: 'closed', sort: 'updated',
              direction: 'desc', per_page: 100,
            });
            const allPRs = [...openPRs, ...closedPRs];
            core.info(`Collected ${openPRs.length} open + ${closedPRs.length} closed PRs`);

            // issueNumber → PR[]（按 created_at 降序，最新在前）
            const issuePRMap = new Map();
            for (const pr of allPRs) {
              const text = `${pr.title || ''} ${pr.body || ''}`;
              const refs = [...new Set(
                (text.match(/#(\d+)/g) || []).map(r => parseInt(r.replace('#', ''), 10))
              )];
              for (const ref of refs) {
                if (!issuePRMap.has(ref)) issuePRMap.set(ref, []);
                issuePRMap.get(ref).push(pr);
              }
            }
            // 每个 issue 的 PR 按创建时间降序
            for (const [, prs] of issuePRMap) {
              prs.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            }

            // ── helper: 通过 issue timeline 判断 Copilot 是否已完成工作 ────
            // Copilot Coding Agent 的 PR 在整个执行期间始终为 draft 状态，
            // 不能依赖 draft 标志位推断完成情况；需通过 timeline 事件确认。
            const copilotStatusCache = new Map();
            async function isCopilotWorkFinished(issueNumber) {
              if (copilotStatusCache.has(issueNumber)) {
                return copilotStatusCache.get(issueNumber);
              }
              try {
                const events = await github.paginate(
                  github.rest.issues.listEventsForTimeline,
                  { owner, repo, issue_number: issueNumber, per_page: 100 }
                );
                const finished = events.some(e => e.event === 'copilot_work_finished');
                copilotStatusCache.set(issueNumber, finished);
                return finished;
              } catch (e) {
                core.warning(`  Issue #${issueNumber} timeline fetch failed: ${e.message}`);
                copilotStatusCache.set(issueNumber, false);
                return false;
              }
            }

            // ── 步骤 2: 扫描 A2007 并更新 ──────────────────────
            const sprintDirs = fs.readdirSync(sprintsDir)
              .filter(d => /^\d{8}$/.test(d) &&
                fs.statSync(path.join(sprintsDir, d)).isDirectory());

            let totalUpdated = 0;
            const filesToWrite = new Map();

            for (const sprint of sprintDirs) {
              const sprintPath = path.join(sprintsDir, sprint);
              const taskDirs = fs.readdirSync(sprintPath)
                .filter(d => d.endsWith('-tasks') &&
                  fs.statSync(path.join(sprintPath, d)).isDirectory());

              for (const taskDir of taskDirs) {
                const user = taskDir.replace(/-tasks$/, '');
                const readmePath = path.join(sprintPath, taskDir, 'README.md');
                if (!fs.existsSync(readmePath)) continue;

                let readmeContent = fs.readFileSync(readmePath, 'utf-8');
                const lines = readmeContent.split('\n');
                let fileChanged = false;

                for (let i = 0; i < lines.length; i++) {
                  // 匹配 7 列任务行（与 dispatch 一致）
                  // | [taskId](./tXXX.md) | desc | artPath | issueCol | prCol | status | dateCol |
                  const m = lines[i].match(
                    /^\|\s*\[(\d+)\]\(\.\/t\d+\.md\)\s*\|\s*(.+?)\s*\|\s*([^|]*?)\s*\|\s*([^|]*?)\s*\|\s*([^|]*?)\s*\|\s*([^|]*?)\s*\|\s*([^|]*?)\s*\|$/
                  );
                  if (!m) continue;

                  const [, taskId, , , issueCol, , statusCol] = m;
                  const currentStatus = statusCol.trim();

                  // 只处理「已派发」和「待修订」
                  if (currentStatus !== '已派发' && currentStatus !== '待修订') continue;

                  // 提取关联工单编号
                  const issueMatch = issueCol.match(/#(\d+)/);
                  if (!issueMatch) {
                    core.info(`[${taskId}] 无关联工单，跳过`);
                    continue;
                  }
                  const issueNumber = parseInt(issueMatch[1], 10);

                  // 查找该 issue 关联的 PR
                  const linkedPRs = issuePRMap.get(issueNumber) || [];
                  if (linkedPRs.length === 0) {
                    core.info(`[${taskId}] Issue #${issueNumber} 无关联 PR`);
                    continue;
                  }

                  // 选取最佳 PR：优先 open（非 draft）> open（draft）> merged > closed
                  const openNonDraft = linkedPRs.find(p => p.state === 'open' && !p.draft);
                  const openDraft = linkedPRs.find(p => p.state === 'open' && p.draft);
                  const merged = linkedPRs.find(p => p.merged_at);
                  const closedNotMerged = linkedPRs.find(
                    p => p.state === 'closed' && !p.merged_at
                  );
                  const bestPR = openNonDraft || openDraft || merged || closedNotMerged;

                  if (!bestPR) continue;

                  const cols = lines[i].split('|');
                  // cols 索引: 0='', 1=任务编号, 2=描述, 3=制品路径,
                  //            4=关联工单, 5=关联PR, 6=状态, 7=完成日期, 8=''
                  if (cols.length < 9) continue;

                  let newStatus = null;
                  let newDate = null;
                  let clearPR = false;

                  if (bestPR.merged_at) {
                    // ── PR 已合并 → 已完成 ──
                    newStatus = '已完成';
                    const d = new Date(bestPR.merged_at);
                    newDate = `${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                  } else if (bestPR.state === 'closed' && !bestPR.merged_at) {
                    // ── PR 已关闭（未合并）→ 可执行 ──
                    newStatus = '可执行';
                    clearPR = true;
                  } else if (bestPR.state === 'open' && currentStatus === '已派发') {
                    // ── 查询 issue timeline：copilot_work_finished 出现 → 待修订 ──
                    // Copilot Coding Agent 完成工作后 PR 仍保持 draft，
                    // 必须通过 timeline 事件而非 draft 状态推断完成情况。
                    const copilotDone = await isCopilotWorkFinished(issueNumber);
                    if (copilotDone) {
                      newStatus = '待修订';
                    }
                    // copilot_work_finished 尚未出现 → 仍在执行中，仅更新 PR 列
                  }

                  // 幂等：写入 PR 列
                  const prRef = `#${bestPR.number}`;
                  const currentPR = cols[5].trim();
                  const targetPR = clearPR ? '-' : prRef;
                  const prChanged = currentPR !== targetPR;

                  // 幂等：写入状态列
                  const statusChanged = newStatus && currentStatus !== newStatus;

                  if (!prChanged && !statusChanged) {
                    core.info(`[${taskId}] 无变更（PR=${currentPR}, 状态=${currentStatus}）`);
                    continue;
                  }

                  // 更新 README 表行
                  if (prChanged) {
                    cols[5] = ` ${targetPR} `;
                  }
                  if (statusChanged) {
                    cols[6] = ` ${newStatus} `;
                    if (newDate) {
                      cols[7] = ` ${newDate} `;
                    } else if (newStatus === '可执行') {
                      cols[7] = ' - ';
                    }
                  }
                  lines[i] = cols.join('|');
                  fileChanged = true;

                  core.info(
                    `[${taskId}] Issue #${issueNumber} → PR ${prRef}: ` +
                    `${currentStatus} → ${newStatus || currentStatus}` +
                    (prChanged ? ` (PR: ${currentPR} → ${targetPR})` : '')
                  );

                  // ── 更新 t{taskId}.md ──
                  const detailPath = path.join(
                    sprintPath, taskDir, `t${taskId}.md`
                  );
                  if (fs.existsSync(detailPath)) {
                    let detail = fs.readFileSync(detailPath, 'utf-8');
                    let detailChanged = false;

                    // 更新关联 PR
                    if (prChanged) {
                      if (clearPR) {
                        detail = detail.replace(
                          /^(- 关联 PR：).*$/m, '$1-'
                        );
                      } else {
                        const prUrl = `https://github.com/${owner}/${repo}/pull/${bestPR.number}`;
                        detail = detail.replace(
                          /^(- 关联 PR：).*$/m,
                          `$1[#${bestPR.number}](${prUrl})`
                        );
                      }
                      detailChanged = true;
                    }

                    // 更新状态
                    if (statusChanged) {
                      detail = detail.replace(
                        /^(- 状态：).*$/m, `$1${newStatus}`
                      );
                      detailChanged = true;
                    }

                    // 更新实际完成日期
                    if (newStatus === '已完成' && newDate) {
                      detail = detail.replace(
                        /^(- 实际完成：).*$/m, `$1${newDate}`
                      );
                      detailChanged = true;
                    }

                    if (detailChanged) {
                      filesToWrite.set(detailPath, detail);
                    }
                  }

                  // ── 管理 Issue 生命周期 ──
                  if (newStatus === '已完成') {
                    try {
                      await github.rest.issues.update({
                        owner, repo, issue_number: issueNumber,
                        state: 'closed', state_reason: 'completed',
                      });
                      core.info(`  关闭 Issue #${issueNumber}`);
                    } catch (e) {
                      core.warning(`  关闭 Issue #${issueNumber} 失败: ${e.message}`);
                    }
                  } else if (newStatus === '可执行') {
                    try {
                      await github.rest.issues.createComment({
                        owner, repo, issue_number: issueNumber,
                        body: `PR #${bestPR.number} 已关闭（未合并），任务 t${taskId} 回退为「可执行」，等待重新派发。`,
                      });
                      core.info(`  Issue #${issueNumber} 添加回退评论`);
                    } catch (e) {
                      core.warning(`  Issue #${issueNumber} 评论失败: ${e.message}`);
                    }
                  }

                  totalUpdated++;
                }

                if (fileChanged) {
                  filesToWrite.set(readmePath, lines.join('\n'));
                }
              }
            }

            if (totalUpdated === 0 && filesToWrite.size === 0) {
              core.info('本轮无状态变更');
              return;
            }

            // ── 步骤 3: 写入文件 ────────────────────────────────
            for (const [fp, content] of filesToWrite) {
              fs.writeFileSync(fp, content, 'utf-8');
            }

            // ── 步骤 4: Git commit + push ───────────────────────
            core.info(`共 ${totalUpdated} 个任务状态变更，提交中...`);
            execSync('git config user.name "github-actions[bot]"', { cwd: workspace });
            execSync(
              'git config user.email "github-actions[bot]@users.noreply.github.com"',
              { cwd: workspace }
            );
            execSync('git add sprints/', { cwd: workspace });

            const diff = execSync('git diff --cached --name-only', {
              cwd: workspace, encoding: 'utf-8',
            }).trim();

            if (!diff) {
              core.info('无文件变更，跳过提交');
              return;
            }

            core.info(`变更文件:\n${diff}`);
            const msg = `chore(sprint): sync ${totalUpdated} task status(es)`;
            execSync(`git commit -m "${msg}"`, { cwd: workspace });
            execSync('git pull --rebase origin main', { cwd: workspace });
            execSync('git push origin main', { cwd: workspace });
            core.info('已推送状态更新');
